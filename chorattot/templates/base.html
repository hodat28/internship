<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>{% block title %}Trang chủ{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles/base.css' %}" />
    <link rel="stylesheet" href="{% static 'styles/sidebar.css' %}" />
    <link rel="stylesheet" href="{% static 'styles/header.css' %}" />
    <script src="{% static 'scripts/sidebar.js' %}" defer></script>
    <script src="{% static 'scripts/header.js' %}" defer></script>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    {% block head %}{% endblock %} {% block scripts %}{% endblock %}
  </head>
  <body>
    <main class="content-container">{% block content %}{% endblock %}</main>

    <!-- Chat Box Popup -->
    <div id="chat-box" class="modal" tabindex="-1" role="dialog">
      <div class="modal-dialog modal-dialog-scrollable" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Danh sách cuộc hội thoại</h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close"
            >
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <div class="chat-conversations">
              <ul id="conversation-list" class="list-group">
                <!-- Conversation items will be dynamically added here -->
              </ul>
            </div>
            <div class="chat-messages mt-3">
              <div id="message-list" class="list-group">
                <!-- Messages will be dynamically added here -->
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <div class="input-group">
              <input
                type="text"
                id="chat-input"
                class="form-control"
                placeholder="Nhập tin nhắn..."
              />
              <div class="input-group-append">
                <button id="send-message" class="btn btn-success">Gửi</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
