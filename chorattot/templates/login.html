<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]>      <html class="no-js"> <!--<![endif]-->
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Chợ rất tốt</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/font-awesome/css/font-awesome.min.css"
      rel="stylesheet"
    />
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <section class="vh-100">
      <div class="container py-5 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
          <div class="col-12 col-md-8 col-lg-6 col-xl-5">
            <div class="card text-black-100" style="border-radius: 1rem">
              <div class="w-100 py-5">
                <img
                  class="rounded mx-auto d-block"
                  src="{% static 'images/logo.png' %}"
                  alt="Logo"
                />
              </div>
              <div class="card-body p-5 pt-0 text-left">
                <div class="md-5 mt-md-4 pb-5">
                  <form action="/login" method="POST">
                    {% csrf_token %}
                    <h2 class="fw-bold mb-4 text-uppercase">Đăng nhập</h2>
                    <div
                      data-mdb-input-init
                      class="form-outline form-white mb-4"
                    >
                      <input
                        type="email"
                        id="user_email"
                        class="form-control form-control-lg text-black-50 fs-6"
                        placeholder="Email"
                      />
                    </div>

                    <div
                      data-mdb-input-init
                      class="form-outline form-white mb-4"
                    >
                      <input
                        type="password"
                        id="user_password"
                        class="form-control form-control-lg text-black-50 fs-6"
                        placeholder="Mật khẩu"
                      />
                    </div>

                    <p class="small mb-4 pb-lg-2">
                      <a
                        class="text-black-50 link-offset-2 link-offset-3-hover link-underline-secondary link-underline-opacity-0 link-underline-opacity-75-hover"
                        href="/forgotPassword"
                        >Quên mật khẩu?</a
                      >
                    </p>

                    <button
                      data-mdb-button-init
                      data-mdb-ripple-init
                      class="btn btn-primary rounded w-100 px-5"
                      style="background-color: #0047ab"
                      type="submit"
                    >
                      Đăng nhập
                    </button>
                  </form>
                </div>
                <div>
                  <p class="mb-0">
                    Bạn chưa có tài khoản?
                    <a href="/register" class="text-black-50 fw-bold"
                      >Đăng ký ngay!</a
                    >
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
</html>
