<!DOCTYPE html>

<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Chợ rất tốt</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/password_new.css' %}" />
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="{% static 'images/logo.svg' %}" alt="Logo" />
      </div>
      <div class="form-container">
        <h2>ĐỔI MẬT KHẨU</h2>
        <form>
            <div class="form-group">
                <label for="new-password">Mật khẩu mới</label>
                <input type="password" id="new-password" placeholder="Mật khẩu mới" required>
            </div>
            <div class="form-group">
                <label for="password">Xác nhận mật khẩu</label>
                <input type="password" id="password" placeholder="Xác nhận mật khẩu" required>
            </div>
            <div class="buttons">
                <button type="button"><a href="#">Quay lại</a></button>
                <button type="submit" class="confirmPassword">Xác nhận</button>
            </div>
        </form>
    </div>
    </div>
  </body>
</html>
