{% extends 'base.html' %}
{% load static %}
{% block title %}Tìm kiếm{% endblock %}
{% block head %}
  <link rel="stylesheet" href="{% static 'styles/home.css' %}">
  <link rel="stylesheet" href="{% static 'styles/loading.css' %}">
  <script src="{% static 'scripts/searchPage.js' %}" type="module" defer></script> 
{% endblock %}

{% block content %}
  <h1 class="text-center my-4 h1">Kết quả tìm kiếm: <span class="keyword">{{search}}</span></h1>
  <div class="container position-relative">
    <div id="loading-spinner" class="position-absolute top-50 start-50 translate-middle d-none z-3 w-100 h-100">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
    <div class="row row-cols-2 row-cols-xl-5 row-cols-md-3 row-cols-lg-4 gy-5 d-flex align-items-stretch posts"></div>
    <div id="pagination-container" class="mt-5"></div>
  </div>
{% endblock %}
